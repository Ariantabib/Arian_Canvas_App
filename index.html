<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>AR Draw Assist - Pro Edition</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; touch-action: none;
        }

        :root {
            --primary: #6C5CE7; --primary-light: #a29bfe;
            --accent: #00cec9; --dark: #1a1a2e;
            --card-bg: rgba(26, 26, 46, 0.85);
            --text: #f0f0f0; --text-dim: #a0a0a0;
            --danger: #ff6b6b; --success: #00b894;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        body {
            background: #000; color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden; height: 100dvh; width: 100vw; position: fixed;
        }

        /* --- SPLASH SCREEN --- */
        #splashScreen {
            position: fixed; inset: 0; background: linear-gradient(135deg, #0f0f1e, var(--dark));
            z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #splashScreen.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }
        .splash-icon {
            width: 90px; height: 90px; border-radius: 24px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex; align-items: center; justify-content: center;
            font-size: 42px; margin-bottom: 20px;
            box-shadow: 0 15px 40px rgba(108,92,231,0.4);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .splash-title { font-size: 26px; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 8px; }
        .splash-sub { color: var(--text-dim); font-size: 14px; margin-bottom: 36px; }
        .splash-btn {
            padding: 14px 42px; background: var(--primary); color: white;
            border: none; border-radius: 50px; font-size: 16px; font-weight: 700;
            box-shadow: 0 8px 24px rgba(108,92,231,0.4); transition: transform 0.2s;
        }
        .splash-btn:active { transform: scale(0.95); }

        /* --- MAIN APP --- */
        #app { position: fixed; inset: 0; display: none; }
        #app.active { display: block; }
        #cam { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #overlay { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; transition: mix-blend-mode 0.3s; }
        #edgeCvs { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }

        /* --- CORNER HANDLES --- */
        .ch {
            position: absolute; width: 56px; height: 56px;
            z-index: 50; display: none; margin: -28px 0 0 -28px;
        }
        .ch .dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--accent); border: 3px solid white;
            box-shadow: 0 2px 10px rgba(0,206,201,0.5); transition: transform 0.1s;
        }
        .ch:active .dot { transform: translate(-50%,-50%) scale(1.5); background: var(--primary-light); }

        /* --- UI ELEMENTS WITH SMOOTH TRANSITIONS --- */
        #topBar, #botPanel, #miniBar {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- TOP BAR --- */
        #topBar {
            position: absolute; top: 0; left: 0; right: 0; z-index: 20;
            padding: 12px; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            display: flex; justify-content: center;
        }
        .status-pill {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 16px; background: rgba(0,0,0,0.5);
            border-radius: 50px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .status-dot.warn { background: var(--danger); }
        .status-txt { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }

        /* --- BOTTOM PANEL --- */
        #botPanel {
            position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
            padding: 20px 16px calc(var(--safe-bottom) + 12px);
        }
        .ctrl-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; opacity: 0.5; pointer-events: none; transition: opacity 0.3s; }
        .ctrl-row.active { opacity: 1; pointer-events: auto; }
        .ctrl-lbl { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; width: 50px; }
        .ctrl-val { font-size: 13px; font-weight: 700; color: var(--accent); width: 40px; text-align: right; }
        
        input[type="range"] {
            -webkit-appearance: none; flex: 1; height: 6px; border-radius: 3px;
            background: rgba(255,255,255,0.2); outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
            background: white; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid var(--primary);
        }

        .tools-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; display: none; }
        .tools-grid.active { display: grid; }
        .tool-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.05);
            padding: 8px 4px; border-radius: 12px; color: white; font-size: 11px; font-weight: 600;
            display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s;
        }
        .tool-btn:active { background: var(--primary); transform: scale(0.95); }
        .tool-btn.on { background: var(--primary-light); color: var(--dark); border-color: white; }

        .main-actions { display: flex; justify-content: center; gap: 16px; }
        .action-btn {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            background: none; border: none; color: white;
        }
        .action-icon {
            width: 54px; height: 54px; border-radius: 50%; background: var(--card-bg);
            display: flex; align-items: center; justify-content: center; font-size: 22px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); transition: 0.2s;
        }
        .action-btn:active .action-icon { transform: scale(0.9); background: var(--primary); }
        .action-btn span { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }

        /* --- MINI BAR (CORNER MODE) --- */
        #miniBar {
            position: absolute; bottom: calc(var(--safe-bottom) + 16px); left: 16px; right: 16px;
            z-index: 30; background: var(--card-bg); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); display: none; flex-direction: column; gap: 16px;
        }
        #miniBar.active { display: flex; }
        .mini-actions { display: flex; gap: 8px; }
        .mini-btn {
            flex: 1; padding: 12px 0; border-radius: 14px; background: rgba(255,255,255,0.1);
            color: white; font-size: 13px; font-weight: 700; border: none; transition: 0.2s;
        }
        .mini-btn:active { transform: scale(0.95); }
        .mini-btn.primary { background: var(--primary); }
        .mini-btn.danger { background: rgba(255,107,107,0.2); color: var(--danger); }

        /* --- ZEN MODE (HIDE UI) BUTTON --- */
        #eyeBtn {
            position: absolute; top: 12px; right: 16px; z-index: 100;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15); color: white; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #eyeBtn:active { transform: scale(0.9); }

        /* --- UI HIDDEN STATE --- */
        .ui-hidden #topBar { opacity: 0 !important; pointer-events: none !important; transform: translateY(-20px); }
        .ui-hidden #botPanel { opacity: 0 !important; pointer-events: none !important; transform: translateY(20px); }
        .ui-hidden #miniBar { opacity: 0 !important; pointer-events: none !important; transform: translateY(20px) scale(0.95); }
        .ui-hidden #eyeBtn {
            opacity: 0.3; transform: scale(0.85); background: transparent; 
            border-color: transparent; box-shadow: none;
        }

        /* --- UPLOAD MODAL --- */
        #modalWrap {
            position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; padding: 24px;
        }
        #modalWrap.active { display: flex; }
        .modal-card { background: var(--dark); width: 100%; max-width: 340px; border-radius: 24px; padding: 32px 24px; border: 1px solid rgba(255,255,255,0.1); }
        .modal-title { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        .modal-desc { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 24px; }
        .upload-zone {
            border: 2px dashed rgba(108,92,231,0.5); border-radius: 16px; padding: 40px 20px;
            text-align: center; background: rgba(108,92,231,0.05); margin-bottom: 16px; transition: 0.2s;
        }
        .upload-zone:active { background: rgba(108,92,231,0.15); border-color: var(--primary-light); }
        .upload-zone .icon { font-size: 40px; margin-bottom: 10px; }
        .upload-zone .text { font-size: 15px; font-weight: 700; color: var(--primary-light); }
        .modal-close { width: 100%; padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.1); color: white; font-weight: 700; border: none; }

        /* --- TOAST --- */
        #toast {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%) scale(0.9);
            z-index: 200; background: var(--primary); color: white; padding: 10px 24px;
            border-radius: 50px; font-size: 13px; font-weight: 700; opacity: 0; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: none;
        }
        #toast.vis { opacity: 1; transform: translateX(-50%) scale(1); }
        
        #fileIn { display: none; }
    </style>
</head>
<body>

<div id="splashScreen">
    <div class="splash-icon">🎨</div>
    <div class="splash-title">AR Draw Pro</div>
    <div class="splash-sub">Precise Tracing & Overlay</div>
    <button class="splash-btn" onclick="startApp()">Start Drawing</button>
</div>

<div id="app">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <canvas id="edgeCvs"></canvas>

    <div class="ch" id="c0"><div class="dot"></div></div>
    <div class="ch" id="c1"><div class="dot"></div></div>
    <div class="ch" id="c2"><div class="dot"></div></div>
    <div class="ch" id="c3"><div class="dot"></div></div>

    <button id="eyeBtn" onclick="toggleUI()">👁️</button>

    <div id="topBar">
        <div class="status-pill">
            <div class="status-dot" id="sDot"></div>
            <span class="status-txt" id="sTxt">Initializing...</span>
        </div>
    </div>

    <div id="botPanel">
        <div class="ctrl-row" id="opCtrl">
            <span class="ctrl-lbl">Opacity</span>
            <input type="range" id="opSlider" min="0" max="100" value="70" oninput="setOp(this.value)">
            <span class="ctrl-val" id="opVal">70%</span>
        </div>
        
        <div class="tools-grid" id="toolsGrid">
            <button class="tool-btn" onclick="flipI('h')"><span>↔</span> Flip H</button>
            <button class="tool-btn" onclick="flipI('v')"><span>↕</span> Flip V</button>
            <button class="tool-btn" onclick="rotI()"><span>⟳</span> Rotate</button>
            <button class="tool-btn" id="blendBtn" onclick="togBlend()"><span>🌗</span> Multiply</button>
        </div>

        <div class="main-actions">
            <button class="action-btn" onclick="openUpload()">
                <div class="action-icon">🖼️</div><span>Load Image</span>
            </button>
            <button class="action-btn" onclick="enterCorners()">
                <div class="action-icon">📐</div><span>Corners</span>
            </button>
        </div>
    </div>

    <div id="miniBar">
        <div class="ctrl-row active" style="margin-bottom:0;">
            <span class="ctrl-lbl">Opacity</span>
            <input type="range" id="mOpSlider" min="0" max="100" value="70" oninput="setOp(this.value)">
            <span class="ctrl-val" id="mOpVal">70%</span>
        </div>
        <div class="mini-actions">
            <button class="mini-btn" onclick="resetC()">Reset</button>
            <button class="mini-btn danger" id="lBtn" onclick="togLock()">Lock</button>
            <button class="mini-btn primary" onclick="exitCorners()">Done</button>
        </div>
    </div>
</div>

<div id="modalWrap">
    <div class="modal-card">
        <div class="modal-title">Load Reference</div>
        <div class="modal-desc">Select an image or architectural sketch to trace.</div>
        <div class="upload-zone" onclick="document.getElementById('fileIn').click()">
            <div class="icon">📂</div>
            <div class="text">Tap to Browse</div>
        </div>
        <button class="modal-close" onclick="closeUpload()">Cancel</button>
    </div>
</div>

<div id="toast"></div>
<input type="file" id="fileIn" accept="image/*" onchange="handleFile(event)">

<script>
const S = {
    stream: null, track: null,
    img: null, loaded: false,
    opacity: 0.7, scale: 1,
    flipH: false, flipV: false, rot: 0,
    blendMode: 'normal', // normal or multiply
    corners: null, cornerMode: false, locked: false,
    uiHidden: false, // اضافه شدن وضعیت مخفی بودن رابط کاربری
    srcCanvas: null, 
    meshDirty: false, 
    needsRender: false 
};

const W = () => window.innerWidth;
const H = () => window.innerHeight;

const offCvs = document.createElement('canvas');
const offCtx = offCvs.getContext('2d', { alpha: true }); 

function startApp() {
    document.getElementById('splashScreen').classList.add('hidden');
    setTimeout(() => {
        document.getElementById('splashScreen').style.display = 'none';
        document.getElementById('app').classList.add('active');
        initCam();
    }, 500);
}

// ---- UI TOGGLE (ZEN MODE) ----
function toggleUI() {
    S.uiHidden = !S.uiHidden;
    const app = document.getElementById('app');
    const eyeBtn = document.getElementById('eyeBtn');
    
    if (S.uiHidden) {
        app.classList.add('ui-hidden');
        eyeBtn.innerHTML = '👁️'; 
        // وقتی هاید میشه آیکون چشم روی صفحه میمونه ولی خیلی محو
        toast('UI Hidden. Tap the faint eye to restore.');
    } else {
        app.classList.remove('ui-hidden');
        eyeBtn.innerHTML = '👁️';
    }
}

// ---- CAMERA ----
async function initCam() {
    try {
        if (S.stream) S.stream.getTracks().forEach(t => t.stop());
        S.stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 3840 }, height: { ideal: 2160 } },
            audio: false
        });
        const v = document.getElementById('cam');
        v.srcObject = S.stream;
        await v.play();
        status('Camera Ready', false);
        resize();
        requestAnimationFrame(render);
    } catch (e) {
        status('Camera Blocked', true);
        toast('Please allow camera access!');
    }
}

// ---- RESIZE ----
function resize() {
    const w = W(), h = H();
    ['overlay', 'edgeCvs'].forEach(id => {
        const c = document.getElementById(id);
        c.width = w; c.height = h;
    });
    offCvs.width = w; offCvs.height = h;
    if (S.loaded && !S.corners) defCorners();
    S.meshDirty = true;
    S.needsRender = true;
}
window.addEventListener('resize', resize);

// ---- UPLOAD & SETUP ----
function openUpload() { document.getElementById('modalWrap').classList.add('active'); }
function closeUpload() { document.getElementById('modalWrap').classList.remove('active'); }

function handleFile(e) {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
            S.img = img; S.loaded = true;
            S.flipH = S.flipV = false; S.rot = 0;
            defCorners(); buildSource();
            
            document.getElementById('opCtrl').classList.add('active');
            document.getElementById('toolsGrid').classList.add('active');
            status('Image Loaded', false);
            toast('Use Corners to match perspective!');
            closeUpload();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(f);
    e.target.value = '';
}

function buildSource() {
    if (!S.img) return;
    let sw = S.img.naturalWidth, sh = S.img.naturalHeight;
    const rot = S.rot % 4;
    
    const c = document.createElement('canvas');
    if (rot === 1 || rot === 3) { c.width = sh; c.height = sw; }
    else { c.width = sw; c.height = sh; }

    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    ctx.save();
    ctx.translate(c.width / 2, c.height / 2);
    ctx.rotate(rot * Math.PI / 2);
    ctx.scale(S.flipH ? -1 : 1, S.flipV ? -1 : 1);
    ctx.drawImage(S.img, -sw / 2, -sh / 2, sw, sh);
    ctx.restore();

    S.srcCanvas = c;
    S.meshDirty = true; S.needsRender = true;
}

function defCorners() {
    if (!S.img) return;
    const w = W(), h = H();
    const ar = S.img.naturalWidth / S.img.naturalHeight;
    let iw, ih;
    if (ar > w / h) { iw = w * 0.8; ih = iw / ar; }
    else { ih = h * 0.6; iw = ih * ar; }
    const cx = w / 2, cy = h / 2;
    S.corners = [
        { x: cx - iw / 2, y: cy - ih / 2 },
        { x: cx + iw / 2, y: cy - ih / 2 },
        { x: cx + iw / 2, y: cy + ih / 2 },
        { x: cx - iw / 2, y: cy + ih / 2 },
    ];
    syncH();
    S.meshDirty = true; S.needsRender = true;
}

// ---- UI CONTROLS ----
function setOp(v) {
    S.opacity = v / 100;
    const txt = v + '%';
    document.getElementById('opVal').textContent = txt;
    document.getElementById('mOpVal').textContent = txt;
    document.getElementById('opSlider').value = v;
    document.getElementById('mOpSlider').value = v;
    S.needsRender = true; 
}

function flipI(d) { d === 'h' ? S.flipH = !S.flipH : S.flipV = !S.flipV; buildSource(); }
function rotI() { S.rot = (S.rot + 1) % 4; buildSource(); }

function togBlend() {
    S.blendMode = S.blendMode === 'normal' ? 'multiply' : 'normal';
    const btn = document.getElementById('blendBtn');
    const overlay = document.getElementById('overlay');
    
    if(S.blendMode === 'multiply') {
        btn.classList.add('on');
        overlay.style.mixBlendMode = 'multiply';
        toast('Multiply Mode: White background hidden!');
    } else {
        btn.classList.remove('on');
        overlay.style.mixBlendMode = 'normal';
        toast('Normal Mode Active');
    }
}

// ---- CORNER LOGIC ----
function enterCorners() {
    if (!S.loaded) return toast('Load image first!');
    S.cornerMode = true; S.locked = false;
    document.getElementById('botPanel').style.display = 'none';
    document.getElementById('miniBar').classList.add('active');
    document.getElementById('lBtn').textContent = 'Lock';
    document.getElementById('lBtn').className = 'mini-btn danger';
    showCH(true); S.needsRender = true;
}

function exitCorners() {
    S.cornerMode = false;
    document.getElementById('botPanel').style.display = 'block';
    document.getElementById('miniBar').classList.remove('active');
    showCH(false); S.needsRender = true;
}

function togLock() {
    S.locked = !S.locked;
    const btn = document.getElementById('lBtn');
    if (S.locked) {
        btn.textContent = 'Unlock';
        btn.className = 'mini-btn';
        showCH(false); toast('Locked & Ready to draw!');
    } else {
        btn.textContent = 'Lock';
        btn.className = 'mini-btn danger';
        showCH(true);
    }
    S.needsRender = true;
}

function resetC() { defCorners(); toast('Corners Reset'); }
function showCH(v) { for (let i = 0; i < 4; i++) document.getElementById('c' + i).style.display = v ? 'block' : 'none'; }
function syncH() {
    if (!S.corners) return;
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('c' + i);
        el.style.left = S.corners[i].x + 'px';
        el.style.top = S.corners[i].y + 'px';
    }
}

// Touch Dragging
(function () {
    let act = -1;
    for (let i = 0; i < 4; i++) {
        const el = document.getElementById('c' + i);
        el.addEventListener('touchstart', e => {
            if (S.locked) return; e.preventDefault(); act = i;
        }, { passive: false });
        el.addEventListener('touchmove', e => {
            if (S.locked || act !== i) return; e.preventDefault();
            const t = e.touches[0];
            S.corners[i].x = Math.max(0, Math.min(W(), t.clientX));
            S.corners[i].y = Math.max(0, Math.min(H(), t.clientY));
            syncH(); S.meshDirty = true; S.needsRender = true;
        }, { passive: false });
        el.addEventListener('touchend', () => { act = -1; });
    }
})();

// ---- RENDER ENGINE ----
function render() {
    if (S.loaded && S.needsRender) { 
        drawOverlay(); drawEdge(); S.needsRender = false; 
    }
    requestAnimationFrame(render);
}

function drawOverlay() {
    const canvas = document.getElementById('overlay');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (!S.img || !S.corners || !S.srcCanvas) return;

    if (S.meshDirty) {
        offCtx.clearRect(0, 0, offCvs.width, offCvs.height);
        offCtx.save();
        offCtx.globalAlpha = 1.0; 
        
        const src = S.srcCanvas;
        const N = 24;
        for (let i = 0; i < N; i++) {
            for (let j = 0; j < N; j++) {
                const u0 = i / N, v0 = j / N, u1 = (i + 1) / N, v1 = (j + 1) / N;
                const p00 = bl(S.corners, u0, v0), p10 = bl(S.corners, u1, v0);
                const p11 = bl(S.corners, u1, v1), p01 = bl(S.corners, u0, v1);
                const sx0 = u0 * src.width, sy0 = v0 * src.height;
                const sx1 = u1 * src.width, sy1 = v1 * src.height;
                
                tri(offCtx, src, sx0, sy0, sx1, sy0, sx0, sy1, p00.x, p00.y, p10.x, p10.y, p01.x, p01.y);
                tri(offCtx, src, sx1, sy0, sx1, sy1, sx0, sy1, p10.x, p10.y, p11.x, p11.y, p01.x, p01.y);
            }
        }
        offCtx.restore();
        S.meshDirty = false;
    }

    ctx.save();
    ctx.globalAlpha = S.opacity;
    ctx.drawImage(offCvs, 0, 0);
    ctx.restore();
}

function bl(c, u, v) {
    const tx = c[0].x + (c[1].x - c[0].x) * u, ty = c[0].y + (c[1].y - c[0].y) * u;
    const bx = c[3].x + (c[2].x - c[3].x) * u, by = c[3].y + (c[2].y - c[3].y) * u;
    return { x: tx + (bx - tx) * v, y: ty + (by - ty) * v };
}

function tri(ctx, img, sx0, sy0, sx1, sy1, sx2, sy2, dx0, dy0, dx1, dy1, dx2, dy2) {
    const cx = (dx0 + dx1 + dx2) / 3, cy = (dy0 + dy1 + dy2) / 3, exp = 0.8; 
    const d0 = Math.hypot(dx0 - cx, dy0 - cy) || 1, d1 = Math.hypot(dx1 - cx, dy1 - cy) || 1, d2 = Math.hypot(dx2 - cx, dy2 - cy) || 1;
    const ex0 = dx0 + (dx0 - cx) / d0 * exp, ey0 = dy0 + (dy0 - cy) / d0 * exp;
    const ex1 = dx1 + (dx1 - cx) / d1 * exp, ey1 = dy1 + (dy1 - cy) / d1 * exp;
    const ex2 = dx2 + (dx2 - cx) / d2 * exp, ey2 = dy2 + (dy2 - cy) / d2 * exp;

    ctx.save(); ctx.beginPath();
    ctx.moveTo(ex0, ey0); ctx.lineTo(ex1, ey1); ctx.lineTo(ex2, ey2);
    ctx.closePath(); ctx.clip();

    const d = sx0 * (sy1 - sy2) + sx1 * (sy2 - sy0) + sx2 * (sy0 - sy1);
    if (Math.abs(d) > 0.001) {
        const a = (dx0 * (sy1 - sy2) + dx1 * (sy2 - sy0) + dx2 * (sy0 - sy1)) / d;
        const b = (dx0 * (sx2 - sx1) + dx1 * (sx0 - sx2) + dx2 * (sx1 - sx0)) / d;
        const e = (dx0 * (sx1 * sy2 - sx2 * sy1) + dx1 * (sx2 * sy0 - sx0 * sy2) + dx2 * (sx0 * sy1 - sx1 * sy0)) / d;
        const f = (dy0 * (sy1 - sy2) + dy1 * (sy2 - sy0) + dy2 * (sy0 - sy1)) / d;
        const g = (dy0 * (sx2 - sx1) + dy1 * (sx0 - sx2) + dy2 * (sx1 - sx0)) / d;
        const h = (dy0 * (sx1 * sy2 - sx2 * sy1) + dy1 * (sx2 * sy0 - sx0 * sy2) + dy2 * (sx0 * sy1 - sx1 * sy0)) / d;
        ctx.setTransform(a, f, b, g, e, h);
        ctx.drawImage(img, 0, 0);
    }
    ctx.restore();
}

function drawEdge() {
    const cvs = document.getElementById('edgeCvs'), ctx = cvs.getContext('2d');
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    if (!S.corners || !S.cornerMode || S.locked) return;

    ctx.strokeStyle = '#00cec9'; ctx.lineWidth = 2; ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(S.corners[0].x, S.corners[0].y);
    for(let i=1; i<4; i++) ctx.lineTo(S.corners[i].x, S.corners[i].y);
    ctx.closePath(); ctx.stroke(); ctx.setLineDash([]);
}

// Utils
function status(t, w) { document.getElementById('sTxt').textContent = t; document.getElementById('sDot').className = w ? 'status-dot warn' : 'status-dot'; }
let tt; function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('vis'); clearTimeout(tt); tt = setTimeout(() => t.classList.remove('vis'), 2000); }
(async () => { const r = async () => { try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){} }; await r(); document.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') r(); }); })();
</script>
