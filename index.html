<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دستیار طراحی و پرسپکتیو</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        
        /* Camera Feed */
        #camera-feed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Overlay Image Container */
        #perspective-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; z-index: 2; pointer-events: none; }
        #overlay-image { width: 500px; height: 500px; object-fit: contain; opacity: 0.5; }
        
        /* Corner Handles */
        .corner { position: absolute; width: 40px; height: 40px; background: rgba(0, 150, 255, 0.7); border: 3px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 3; touch-action: none; display: none; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .corner::after { content: ''; position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }

        /* Control Panel */
        #controls { position: absolute; bottom: 20px; left: 5%; width: 90%; background: rgba(30, 30, 30, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 20px; border-radius: 24px; z-index: 10; color: white; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .control-group { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        label { font-size: 14px; font-weight: 500; white-space: nowrap; }
        
        select, input[type="file"] { width: 100%; padding: 10px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; font-size: 14px; }
        select option { background: #333; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #0096ff; cursor: pointer; margin-top: -8px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.3); border-radius: 2px; }
        
        /* Custom File Button */
        .file-upload-wrapper { position: relative; width: 100%; text-align: center; background: #0096ff; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 15px; }
        .file-upload-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline></video>
    
    <div id="perspective-container">
        <img id="overlay-image" src="" alt="Overlay">
    </div>

    <div id="pt0" class="corner"></div>
    <div id="pt1" class="corner"></div>
    <div id="pt2" class="corner"></div>
    <div id="pt3" class="corner"></div>

    <div id="controls">
        <div class="control-group">
            <select id="camera-select"></select>
        </div>
        
        <div class="control-group">
            <div class="file-upload-wrapper">
                انتخاب عکس از گالری
                <input type="file" id="image-upload" accept="image/*">
            </div>
        </div>
        
        <div class="control-group" dir="ltr">
            <label>Opacity</label>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.05" value="0.5">
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');
        const cameraSelect = document.getElementById('camera-select');
        const imageUpload = document.getElementById('image-upload');
        const opacitySlider = document.getElementById('opacity-slider');
        const overlayImage = document.getElementById('overlay-image');
        const container = document.getElementById('perspective-container');
        const corners = [
            document.getElementById('pt0'),
            document.getElementById('pt1'),
            document.getElementById('pt2'),
            document.getElementById('pt3')
        ];

        // --- Camera Setup ---
        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true }); // Request permission first
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                
                cameraSelect.innerHTML = '';
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `دوربین ${index + 1} (لنزها را تست کنید)`;
                    cameraSelect.appendChild(option);
                });
                
                if (videoDevices.length > 0) startCamera(videoDevices[0].deviceId);
            } catch (err) {
                alert('خطا در دسترسی به دوربین: ' + err.message);
            }
        }

        async function startCamera(deviceId) {
            if (window.stream) window.stream.getTracks().forEach(track => track.stop());
            const constraints = {
                video: { deviceId: deviceId ? { exact: deviceId } : undefined, facingMode: 'environment' }
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                window.stream = stream;
                video.srcObject = stream;
            } catch (err) {
                console.error('Error starting camera: ', err);
            }
        }

        cameraSelect.addEventListener('change', (e) => startCamera(e.target.value));
        getCameras();

        // --- Image & Opacity Controls ---
        opacitySlider.addEventListener('input', (e) => {
            overlayImage.style.opacity = e.target.value;
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    overlayImage.src = event.target.result;
                    initCorners();
                };
                reader.readAsDataURL(file);
            }
        });

        // --- Perspective Transform Logic (Homography) ---
        // Image original size in the DOM
        const imgW = 500, imgH = 500; 
        let points = [ {x: 50, y: 50}, {x: 350, y: 50}, {x: 350, y: 400}, {x: 50, y: 400} ];

        function initCorners() {
            // Position handles on screen initially
            const w = window.innerWidth, h = window.innerHeight;
            points = [
                {x: w*0.2, y: h*0.2}, {x: w*0.8, y: h*0.2}, 
                {x: w*0.8, y: h*0.6}, {x: w*0.2, y: h*0.6}
            ];
            
            corners.forEach((corner, i) => {
                corner.style.display = 'block';
                corner.style.left = points[i].x + 'px';
                corner.style.top = points[i].y + 'px';
            });
            updateTransform();
        }

        // Gaussian Elimination to solve 8x8 linear system for matrix3d
        function solve(A, b) {
            const n = A.length;
            for (let i = 0; i < n; i++) A[i].push(b[i]);
            for (let i = 0; i < n; i++) {
                let maxEl = Math.abs(A[i][i]), maxRow = i;
                for (let k = i + 1; k < n; k++) if (Math.abs(A[k][i]) > maxEl) { maxEl = Math.abs(A[k][i]); maxRow = k; }
                for (let k = i; k < n + 1; k++) { let tmp = A[maxRow][k]; A[maxRow][k] = A[i][k]; A[i][k] = tmp; }
                for (let k = i + 1; k < n; k++) {
                    let c = -A[k][i] / A[i][i];
                    for (let j = i; j < n + 1; j++) { if (i === j) A[k][j] = 0; else A[k][j] += c * A[i][j]; }
                }
            }
            let x = new Array(n);
            for (let i = n - 1; i > -1; i--) {
                x[i] = A[i][n] / A[i][i];
                for (let k = i - 1; k > -1; k--) A[k][n] -= A[k][i] * x[i];
            }
            return x;
        }

        function updateTransform() {
            // Source points (the flat image)
            const src = [ {x:0,y:0}, {x:imgW,y:0}, {x:imgW,y:imgH}, {x:0,y:imgH} ];
            // Destination points (the draggable handles)
            const dst = points;

            let A = [], b = [];
            for (let i = 0; i < 4; i++) {
                A.push([src[i].x, src[i].y, 1, 0, 0, 0, -src[i].x * dst[i].x, -src[i].y * dst[i].x]);
                A.push([0, 0, 0, src[i].x, src[i].y, 1, -src[i].x * dst[i].y, -src[i].y * dst[i].y]);
                b.push(dst[i].x); b.push(dst[i].y);
            }
            
            const h = solve(A, b);
            const matrix = `matrix3d(${h[0]}, ${h[3]}, 0, ${h[6]}, ${h[1]}, ${h[4]}, 0, ${h[7]}, 0, 0, 1, 0, ${h[2]}, ${h[5]}, 0, 1)`;
            container.style.transform = matrix;
        }

        // --- Dragging Logic ---
        let activeCorner = null;

        corners.forEach((corner, index) => {
            corner.addEventListener('touchstart', (e) => {
                e.preventDefault();
                activeCorner = index;
            }, {passive: false});
        });

        document.addEventListener('touchmove', (e) => {
            if (activeCorner !== null) {
                e.preventDefault();
                const touch = e.touches[0];
                points[activeCorner].x = touch.clientX;
                points[activeCorner].y = touch.clientY;
                corners[activeCorner].style.left = touch.clientX + 'px';
                corners[activeCorner].style.top = touch.clientY + 'px';
                updateTransform();
            }
        }, {passive: false});

        document.addEventListener('touchend', () => { activeCorner = null; });
    </script>
</body>
</html>
